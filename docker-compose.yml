version: "3.8"

# =============================================================================
# Kalshi Bot Swarm -- Docker Compose
# =============================================================================
# Deployment options:
#   1. Single container (default): runs coordinator + all bots + dashboard
#   2. Multi-container: each bot as a separate service (uncomment below)

services:
  # ---- Option 1: All-in-one ----
  swarm:
    build: .
    container_name: kalshi-swarm
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./keys:/app/keys
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    command: python run_swarm.py --port 8080

